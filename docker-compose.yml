services:
  csf:
    image: ghcr.io/tinybluerobots/solidarity-fund:latest
    container_name: csf
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${PORT:-443}:443"
    volumes:
      - ${DATA_DIR:-/var/lib/csf}:/var/lib/csf
    environment:
      - DB_PATH=/var/lib/csf/csf.db
      - FUND_NAME=${FUND_NAME:-Cambridge Solidarity Fund}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - ALTCHA_HMAC_KEY=${ALTCHA_HMAC_KEY:?Set ALTCHA_HMAC_KEY in .env}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - CLICKSEND_USERNAME=${CLICKSEND_USERNAME}
      - CLICKSEND_API_KEY=${CLICKSEND_API_KEY}
      - SMS_FROM_NAME=${SMS_FROM_NAME:-CSF}
      - SMS_LOG_LEVEL=${SMS_LOG_LEVEL:-warn}
      - PORT=443
      - HTTP_PORT=80
      - TLS_CERT=/var/lib/csf/certs/cert.pem
      - TLS_KEY=/var/lib/csf/certs/key.pem
      - NODE_ENV=production
