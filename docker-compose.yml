services:
  csf:
    image: ghcr.io/tinybluerobots/solidarity-fund:latest
    container_name: csf
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-/var/lib/csf}:/var/lib/csf
    environment:
      - DB_PATH=/var/lib/csf/csf.db
      - FUND_NAME=${FUND_NAME:-Community Solidarity Fund}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - ALTCHA_HMAC_KEY=${ALTCHA_HMAC_KEY:?Set ALTCHA_HMAC_KEY in .env}
      - NODE_ENV=production

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${PORT:-443}:443"
    volumes:
      - ${DATA_DIR:-/var/lib/csf}/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - csf

volumes:
  caddy_data:
  caddy_config: