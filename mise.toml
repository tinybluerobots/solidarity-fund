[tools]
bun = "latest"

[tasks.css]
run = "bunx @tailwindcss/cli -i src/web/styles/app.css -o src/web/styles/dist/app.css --watch"
description = "Watch and rebuild Tailwind CSS"

[tasks."css:build"]
run = "bunx @tailwindcss/cli -i src/web/styles/app.css -o src/web/styles/dist/app.css --minify"
description = "Build Tailwind CSS (production)"

[tasks.server]
run = "bun --hot src/web/index.ts"
description = "Start the dev server with hot reload"

[tasks.dev]
depends = ["css", "server"]
description = "Reset DB and start CSS watcher and dev server in parallel"
